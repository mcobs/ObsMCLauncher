name: Release ObsMCLauncher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        rid: [win-x86, win-x64, win-arm64]
    
    env:
      Project_Path: ObsMCLauncher.Desktop/ObsMCLauncher.Desktop.csproj
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore $env:Project_Path
      
    - name: Build application
      run: dotnet build $env:Project_Path -c Release --no-restore

    - name: Get version info
      id: version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ github.event.inputs.tag }}"
        } else {
          $version = "${{ github.ref_name }}"
        }
        $versionNumber = $version -replace '^v', ''
        $isPrerelease = $version -match '-(alpha|beta|rc|pre|test|preview)'
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "version_number=$versionNumber" >> $env:GITHUB_OUTPUT
        echo "is_prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT
        echo "当前版本: $version"
        echo "是否预发布: $isPrerelease"

    - name: Publish ${{ matrix.rid }}
      run: |
        dotnet publish $env:Project_Path -c Release -r ${{ matrix.rid }} --self-contained false `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:DebugType=none `
          -p:DebugSymbols=false `
          -p:Version=${{ steps.version.outputs.version_number }} `
          -o ./publish/${{ matrix.rid }}

    - name: Create ZIP archive
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/${{ matrix.rid }}/* -DestinationPath ./ObsMCLauncher-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip
        $zipFile = Get-Item ./ObsMCLauncher-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip
        $fileSizeMB = [Math]::Round($zipFile.Length / 1MB, 2)
        Write-Host "创建 ZIP 文件: $($zipFile.Name), 大小: $fileSizeMB MB"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ObsMCLauncher-${{ steps.version.outputs.version }}-${{ matrix.rid }}
        path: ./ObsMCLauncher-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip
        retention-days: 1

  release:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version info
      id: version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ github.event.inputs.tag }}"
        } else {
          $version = "${{ github.ref_name }}"
        }
        $isPrerelease = $version -match '-(alpha|beta|rc|pre|test|preview)'
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "is_prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT
        echo "当前版本: $version"
        echo "是否预发布: $isPrerelease"

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: List artifacts
      shell: pwsh
      run: |
        Write-Host "Artifacts 目录内容:"
        Get-ChildItem ./artifacts -Recurse | Format-Table FullName, Length

    - name: Prepare release files
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.version }}"
        New-Item -ItemType Directory -Force -Path ./release
        
        $zipFiles = Get-ChildItem ./artifacts -Recurse -Filter "*.zip"
        Write-Host "找到 $($zipFiles.Count) 个 ZIP 文件"
        
        if ($zipFiles.Count -eq 0) {
          Write-Error "错误: 没有找到 ZIP 文件！"
          exit 1
        }
        
        $zipFiles | ForEach-Object {
          Write-Host "复制文件: $($_.FullName) -> ./release/"
          Copy-Item $_.FullName ./release/
        }
        
        Write-Host "Release 目录内容:"
        Get-ChildItem ./release | Format-Table Name, Length

    - name: Read CHANGELOG
      id: changelog
      shell: pwsh
      run: |
        $changelogPath = "./.github/changelogs/CHANGELOG.md"
        
        if (Test-Path $changelogPath) {
          $content = Get-Content $changelogPath -Raw
          $lines = $content -split "`n"
          $startIndex = 0
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^## \[v") {
              $startIndex = $i
              break
            }
          }
          $changelogContent = ($lines[$startIndex..($lines.Count-1)] -join "`n").Trim()
          
          echo "changelog<<EOF" >> $env:GITHUB_OUTPUT
          echo "$changelogContent" >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT
          Write-Host "读取到 CHANGELOG 内容"
        } else {
          Write-Host "CHANGELOG.md 文件不存在"
          echo "changelog=" >> $env:GITHUB_OUTPUT
        }

    - name: Create Release
      uses: actions/github-script@v6
      with:
        script: |
          const version = '${{ steps.version.outputs.version }}';
          const isPrerelease = ${{ steps.version.outputs.is_prerelease == 'true' }};
          const changelog = `${{ steps.changelog.outputs.changelog }}`;
          
          // 准备发布体
          let body = `## 📥 下载\n\n`;
          body += `| 平台 | 架构 | 文件 |\n`;
          body += `|:----:|:----:|:----:|\n`;
          body += `| Windows | x86 (32位) | [ObsMCLauncher-${version}-win-x86.zip](https://github.com/${{ github.repository }}/releases/download/${version}/ObsMCLauncher-${version}-win-x86.zip) |\n`;
          body += `| Windows | x64 (64位) | [ObsMCLauncher-${version}-win-x64.zip](https://github.com/${{ github.repository }}/releases/download/${version}/ObsMCLauncher-${version}-win-x64.zip) |\n`;
          body += `| Windows | ARM64 | [ObsMCLauncher-${version}-win-arm64.zip](https://github.com/${{ github.repository }}/releases/download/${version}/ObsMCLauncher-${version}-win-arm64.zip) |\n\n`;
          
          if (isPrerelease) {
            body += `---\n\n## ⚠️ 预发布版本警告\n\n`;
            body += `**此版本为预发布版本，可能存在以下问题：**\n`;
            body += `- 🐛 可能包含未发现的 Bug\n`;
            body += `- ⚡ 功能可能不稳定\n`;
            body += `- 🔄 部分功能可能会在正式版中更改\n\n`;
            body += `**不建议在生产环境或日常使用中使用此版本。**\n\n`;
            body += `如果您发现问题，请在 [Issues](https://github.com/${{ github.repository }}/issues) 中反馈。\n`;
          }
          
          if (changelog && changelog.trim()) {
            body += `\n---\n\n`;
            body += changelog;
            body += `\n`;
          } else {
            body += `\n---\n\n## 📋 更新内容\n\n暂无更新内容描述。\n`;
          }
          
          // 创建发布
          const release = await github.rest.repos.createRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            tag_name: version,
            name: `ObsMCLauncher ${version}`,
            body: body,
            draft: false,
            prerelease: isPrerelease
          });
          
          console.log('创建发布成功:', release.data.html_url);
          
          // 上传文件
          const fs = require('fs');
          const path = require('path');
          const releaseFiles = fs.readdirSync('./release');
          
          for (const file of releaseFiles) {
            if (file.endsWith('.zip')) {
              const filePath = path.join('./release', file);
              console.log(`上传文件: ${file}`);
              
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: file,
                data: fs.readFileSync(filePath)
              });
              
              console.log(`文件 ${file} 上传成功`);
            }
          }
          
          console.log('所有文件上传完成');
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
