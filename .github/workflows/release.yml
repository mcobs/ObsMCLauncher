name: Release ObsMCLauncher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        rid:
          - win-x86
          - win-x64
          - win-arm64
          - linux-x64
          - linux-arm64
          - osx-x64
          - osx-arm64
        exclude:
          - os: windows-latest
            rid: linux-x64
          - os: windows-latest
            rid: linux-arm64
          - os: windows-latest
            rid: osx-x64
          - os: windows-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: win-x86
          - os: ubuntu-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: win-arm64
          - os: ubuntu-latest
            rid: osx-x64
          - os: ubuntu-latest
            rid: osx-arm64
          - os: macos-latest
            rid: win-x86
          - os: macos-latest
            rid: win-x64
          - os: macos-latest
            rid: win-arm64
          - os: macos-latest
            rid: linux-x64
          - os: macos-latest
            rid: linux-arm64

    runs-on: ${{ matrix.os }}

    env:
      Project_Path: ObsMCLauncher.Desktop/ObsMCLauncher.Desktop.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install Velopack CLI
      run: dotnet tool install -g vpk

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore ${{ env.Project_Path }}

    - name: Build application
      run: dotnet build ${{ env.Project_Path }} -c Release --no-restore

    - name: Get version info
      id: version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          version="${{ github.event.inputs.tag }}"
        else
          version="${GITHUB_REF#refs/tags/}"
        fi
        version_number=$(echo "$version" | sed 's/^v//')
        if echo "$version" | grep -qE -- '-(alpha|beta|rc|pre|test|preview)'; then
          is_prerelease="true"
        else
          is_prerelease="false"
        fi
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "version_number=$version_number" >> $GITHUB_OUTPUT
        echo "is_prerelease=$is_prerelease" >> $GITHUB_OUTPUT
        echo "当前版本: $version"
        echo "是否预发布: $is_prerelease"

    - name: Publish ${{ matrix.rid }}
      run: |
        dotnet publish ${{ env.Project_Path }} -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=none -p:DebugSymbols=false -p:Version=${{ steps.version.outputs.version_number }} -o ./publish/${{ matrix.rid }}

    - name: Download previous release for delta
      shell: bash
      run: |
        vpk download github --repoUrl https://github.com/mcobs/ObsMCLauncher --token ${{ secrets.RELEASE_TOKEN }} -o ./vpk-prev || echo "No previous release found, skipping delta"

    - name: Pack with Velopack
      shell: bash
      run: |
        rid="${{ matrix.rid }}"
        if [[ "$rid" == win-* ]]; then
          channel="win"
          main_exe="ObsMCLauncher.Desktop.exe"
        elif [[ "$rid" == linux-* ]]; then
          channel="linux"
          main_exe="ObsMCLauncher.Desktop"
        elif [[ "$rid" == osx-* ]]; then
          channel="osx"
          main_exe="ObsMCLauncher.Desktop"
        fi

        # 构建vpk pack命令，-r需要完整RID格式
        pack_args=(-u ObsMCLauncher -v "${{ steps.version.outputs.version_number }}" -p "./publish/${{ matrix.rid }}" -e "$main_exe" -o ./vpk-output --delta BestSpeed -c "$channel" -r "$rid")

        # Windows才需要--noInst，Linux/macOS不生成安装程序
        if [[ "$rid" == win-* ]]; then
          pack_args+=(--noInst true)
        fi

        vpk pack "${pack_args[@]}"

    - name: Rename portable output
      shell: bash
      run: |
        version="${{ steps.version.outputs.version }}"
        rid="${{ matrix.rid }}"
        if [[ "$rid" == linux-* ]]; then
          if [ -f "./vpk-output/ObsMCLauncher.AppImage" ]; then
            mv ./vpk-output/ObsMCLauncher.AppImage "./vpk-output/ObsMCLauncher-${version}-${rid}.AppImage"
          fi
        else
          # Windows和macOS都产出Portable.zip
          if [ -f "./vpk-output/ObsMCLauncher-Portable.zip" ]; then
            mv ./vpk-output/ObsMCLauncher-Portable.zip "./vpk-output/ObsMCLauncher-${version}-${rid}.zip"
          fi
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ObsMCLauncher-${{ steps.version.outputs.version }}-${{ matrix.rid }}
        path: ./vpk-output/
        retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version info
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          version="${{ github.event.inputs.tag }}"
        else
          version="${GITHUB_REF#refs/tags/}"
        fi
        if echo "$version" | grep -qE -- '-(alpha|beta|rc|pre|test|preview)'; then
          is_prerelease="true"
        else
          is_prerelease="false"
        fi
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "is_prerelease=$is_prerelease" >> $GITHUB_OUTPUT
        echo "当前版本: $version"
        echo "是否预发布: $is_prerelease"

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: List artifacts
      run: |
        echo "Artifacts 目录内容:"
        find ./artifacts -type f | head -100

    - name: Prepare release files
      run: |
        version="${{ steps.version.outputs.version }}"
        mkdir -p ./release

        find ./artifacts -type f \( -name "*.zip" -o -name "*.AppImage" -o -name "*.nupkg" -o -name "releases.*.json" -o -name "RELEASES" \) -exec cp {} ./release/ \;

        echo "Release 目录内容:"
        ls -la ./release/

    - name: Read CHANGELOG
      id: changelog
      run: |
        changelog_path="./.github/changelogs/CHANGELOG.md"
        if [ -f "$changelog_path" ]; then
          cp "$changelog_path" /tmp/changelog_content.md
          echo "found=true" >> $GITHUB_OUTPUT
          echo "读取到 CHANGELOG 内容"
        else
          echo "found=false" >> $GITHUB_OUTPUT
          echo "CHANGELOG.md 文件不存在"
        fi

    - name: Create Release
      uses: actions/github-script@v7
      with:
        script: |
          const version = '${{ steps.version.outputs.version }}';
          const isPrerelease = '${{ steps.version.outputs.is_prerelease }}' === 'true';
          const changelogFound = '${{ steps.changelog.outputs.found }}' === 'true';
          let changelog = '';
          if (changelogFound && require('fs').existsSync('/tmp/changelog_content.md')) {
            changelog = require('fs').readFileSync('/tmp/changelog_content.md', 'utf8');
          }

          let body = '## 下载\n\n';
          body += '| 平台 | 架构 | 文件 |\n';
          body += '|:----:|:----:|:----:|\n';
          body += '| Windows | x86 (32位) | [ObsMCLauncher-' + version + '-win-x86.zip](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-win-x86.zip) |\n';
          body += '| Windows | x64 (64位) | [ObsMCLauncher-' + version + '-win-x64.zip](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-win-x64.zip) |\n';
          body += '| Windows | ARM64 | [ObsMCLauncher-' + version + '-win-arm64.zip](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-win-arm64.zip) |\n';
          body += '| Linux | x64 (64位) | [ObsMCLauncher-' + version + '-linux-x64.AppImage](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-linux-x64.AppImage) |\n';
          body += '| Linux | ARM64 | [ObsMCLauncher-' + version + '-linux-arm64.AppImage](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-linux-arm64.AppImage) |\n';
          body += '| macOS | x64 (Intel) | [ObsMCLauncher-' + version + '-osx-x64.zip](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-osx-x64.zip) |\n';
          body += '| macOS | ARM64 (Apple Silicon) | [ObsMCLauncher-' + version + '-osx-arm64.zip](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-osx-arm64.zip) |\n\n';

          if (isPrerelease) {
            body += '---\n\n';
            body += '> [!WARNING]\n';
            body += '> **此版本为预发布版本**\n';
            body += '> - 可能包含未发现的 Bug\n';
            body += '> - 功能可能不稳定\n';
            body += '> - 部分功能可能会在正式版中更改\n';
            body += '> \n';
            body += '> 不建议在生产环境或日常使用中使用此版本。如发现问题请在 [Issues](https://github.com/${{ github.repository }}/issues) 反馈。\n\n';
          }

          if (changelog && changelog.trim()) {
            body += '\n---\n\n';
            body += changelog;
            body += '\n';
          } else {
            body += '\n---\n\n## 更新内容\n\n暂无更新内容描述。\n';
          }

          const release = await github.rest.repos.createRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            tag_name: version,
            name: 'ObsMCLauncher ' + version,
            body: body,
            draft: false,
            prerelease: isPrerelease
          });

          console.log('创建发布成功:', release.data.html_url);

          const fsModule = require('fs');
          const path = require('path');
          const releaseFiles = fsModule.readdirSync('./release');

          for (const file of releaseFiles) {
            const filePath = path.join('./release', file);
            const stat = fsModule.statSync(filePath);
            if (!stat.isFile()) continue;

            console.log('上传文件: ' + file + ' (' + stat.size + ' bytes)');

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: file,
              data: fsModule.readFileSync(filePath)
            });

            console.log('文件 ' + file + ' 上传成功');
          }

          console.log('所有文件上传完成');
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
