name: Release ObsMCLauncher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      warning:
        description: '警告内容 (GitHub Markdown, 如 "> [!WARNING] ...")'
        required: false
        type: string
      known_issues:
        description: '已知问题 (GitHub Markdown, 如 "> [!NOTE] ...")'
        required: false
        type: string
      extra_notes:
        description: '额外说明 (GitHub Markdown)'
        required: false
        type: string
      skip_changelog:
        description: '跳过 CHANGELOG 内容'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        rid:
          - win-x86
          - win-x64
          - win-arm64
          - linux-x64
          - linux-arm64
          - osx-x64
          - osx-arm64
        exclude:
          - os: windows-latest
            rid: linux-x64
          - os: windows-latest
            rid: linux-arm64
          - os: windows-latest
            rid: osx-x64
          - os: windows-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: win-x86
          - os: ubuntu-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: win-arm64
          - os: ubuntu-latest
            rid: osx-x64
          - os: ubuntu-latest
            rid: osx-arm64
          - os: macos-latest
            rid: win-x86
          - os: macos-latest
            rid: win-x64
          - os: macos-latest
            rid: win-arm64
          - os: macos-latest
            rid: linux-x64
          - os: macos-latest
            rid: linux-arm64

    runs-on: ${{ matrix.os }}

    env:
      Project_Path: ObsMCLauncher.Desktop/ObsMCLauncher.Desktop.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install Velopack CLI
      run: dotnet tool install -g vpk

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore ${{ env.Project_Path }}

    - name: Build application
      run: dotnet build ${{ env.Project_Path }} -c Release --no-restore

    - name: Get version info
      id: version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          version="${{ github.event.inputs.tag }}"
        else
          version="${GITHUB_REF#refs/tags/}"
        fi
        version_number=$(echo "$version" | sed 's/^v//')
        if echo "$version" | grep -qE -- '-(alpha|beta|rc|pre|test|preview)'; then
          is_prerelease="true"
        else
          is_prerelease="false"
        fi
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "version_number=$version_number" >> $GITHUB_OUTPUT
        echo "is_prerelease=$is_prerelease" >> $GITHUB_OUTPUT
        echo "当前版本: $version"
        echo "是否预发布: $is_prerelease"

    - name: Publish ${{ matrix.rid }}
      run: |
        dotnet publish ${{ env.Project_Path }} -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=none -p:DebugSymbols=false -p:Version=${{ steps.version.outputs.version_number }} -o ./publish/${{ matrix.rid }}

    - name: Download previous release for delta
      shell: bash
      run: |
        rid="${{ matrix.rid }}"
        vpk download github --repoUrl https://github.com/mcobs/ObsMCLauncher --token ${{ secrets.RELEASE_TOKEN }} -c "$rid" -o ./vpk-prev || echo "No previous release found, skipping delta"

    - name: Pack with Velopack
      shell: bash
      run: |
        rid="${{ matrix.rid }}"
        if [[ "$rid" == win-* ]]; then
          main_exe="ObsMCLauncher.Desktop.exe"
        else
          main_exe="ObsMCLauncher.Desktop"
        fi

        # 根据RID选择图标格式（使用项目目录中的源图标）
        if [[ "$rid" == osx-* ]]; then
          icon_path="./ObsMCLauncher.Desktop/Assets/app_icon.icns"
        else
          icon_path="./ObsMCLauncher.Desktop/Assets/app_icon.ico"
        fi

        # 每个RID用独立channel，避免不同架构的产物互相覆盖
        pack_args=(-u ObsMCLauncher -v "${{ steps.version.outputs.version_number }}" -p "./publish/${{ matrix.rid }}" -e "$main_exe" -o ./vpk-output --delta BestSpeed -c "$rid" -r "$rid" -i "$icon_path")

        # Windows才需要--noInst，Linux/macOS不生成安装程序
        if [[ "$rid" == win-* ]]; then
          pack_args+=(--noInst true)
        fi

        vpk pack "${pack_args[@]}"

    - name: List vpk output and rename
      shell: bash
      run: |
        version="${{ steps.version.outputs.version }}"
        rid="${{ matrix.rid }}"
        echo "=== vpk-output 目录内容 ==="
        ls -la ./vpk-output/ || echo "目录不存在"

        # 重命名便携包
        if [[ "$rid" == linux-* ]]; then
          for f in ./vpk-output/ObsMCLauncher*.AppImage; do
            [ -f "$f" ] && mv "$f" "./vpk-output/ObsMCLauncher-${version}-${rid}.AppImage"
          done
        else
          for f in ./vpk-output/ObsMCLauncher*Portable*.zip; do
            [ -f "$f" ] && mv "$f" "./vpk-output/ObsMCLauncher-${version}-${rid}.zip"
          done
        fi

        echo "=== 重命名后 ==="
        ls -la ./vpk-output/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ObsMCLauncher-${{ steps.version.outputs.version }}-${{ matrix.rid }}
        path: ./vpk-output/
        retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version info
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          version="${{ github.event.inputs.tag }}"
        else
          version="${GITHUB_REF#refs/tags/}"
        fi
        if echo "$version" | grep -qE -- '-(alpha|beta|rc|pre|test|preview)'; then
          is_prerelease="true"
        else
          is_prerelease="false"
        fi
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "is_prerelease=$is_prerelease" >> $GITHUB_OUTPUT
        echo "当前版本: $version"
        echo "是否预发布: $is_prerelease"

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: List artifacts
      run: |
        echo "Artifacts 目录内容:"
        find ./artifacts -type f | head -100

    - name: Prepare release files
      run: |
        version="${{ steps.version.outputs.version }}"
        mkdir -p ./release

        find ./artifacts -type f \( -name "*.zip" -o -name "*.AppImage" -o -name "*.nupkg" -o -name "releases.*.json" -o -name "RELEASES" \) -exec cp {} ./release/ \;

        echo "Release 目录内容:"
        ls -la ./release/

    - name: Read release content
      id: content
      run: |
        # 读取 CHANGELOG
        changelog_path="./.github/changelogs/CHANGELOG.md"
        if [ -f "$changelog_path" ]; then
          cp "$changelog_path" /tmp/changelog_content.md
          echo "changelog_found=true" >> $GITHUB_OUTPUT
          echo "读取到 CHANGELOG 内容"
        else
          echo "changelog_found=false" >> $GITHUB_OUTPUT
          echo "CHANGELOG.md 文件不存在"
        fi

        # 读取 RELEASE_NOTES
        notes_path="./.github/RELEASE_NOTES.md"
        if [ -f "$notes_path" ]; then
          cp "$notes_path" /tmp/release_notes.md
          echo "notes_found=true" >> $GITHUB_OUTPUT
          echo "读取到 RELEASE_NOTES 内容"
        else
          echo "notes_found=false" >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES.md 文件不存在"
        fi

        # 处理 workflow_dispatch 的额外输入（写入文件避免 JS 注入风险）
        echo "${{ github.event.inputs.warning || '' }}" > /tmp/manual_warning.md
        echo "${{ github.event.inputs.known_issues || '' }}" > /tmp/manual_known_issues.md
        echo "${{ github.event.inputs.extra_notes || '' }}" > /tmp/manual_extra_notes.md

        skip_value="${{ github.event.inputs.skip_changelog || 'false' }}"
        echo "skip_changelog=$skip_value" >> $GITHUB_OUTPUT
        echo "has_manual=${{ github.event.inputs.warning || github.event.inputs.known_issues || github.event.inputs.extra_notes }}" >> $GITHUB_OUTPUT

        echo "=== 内容来源 ==="
        echo "CHANGELOG: $(if [ -f "$changelog_path" ]; then echo '已找到'; else echo '未找到'; fi)"
        echo "RELEASE_NOTES: $(if [ -f "$notes_path" ]; then echo '已找到'; else echo '未找到'; fi)"
        echo "手动输入: $(if [ -n '${{ github.event.inputs.warning || github.event.inputs.known_issues || github.event.inputs.extra_notes }}' ]; then echo '有'; else echo '无'; fi)"

    - name: Create Release
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          const version = '${{ steps.version.outputs.version }}';
          const isPrerelease = '${{ steps.version.outputs.is_prerelease }}' === 'true';

          // ---- 读取内容源 ----
          const changelogFound = '${{ steps.content.outputs.changelog_found }}' === 'true';
          const notesFound = '${{ steps.content.outputs.notes_found }}' === 'true';
          const skipChangelog = '${{ steps.content.outputs.skip_changelog }}' === 'true';

          let changelog = '';
          if (changelogFound && !skipChangelog && fs.existsSync('/tmp/changelog_content.md')) {
            changelog = fs.readFileSync('/tmp/changelog_content.md', 'utf8').trim();
          }

          let releaseNotes = '';
          if (notesFound && fs.existsSync('/tmp/release_notes.md')) {
            releaseNotes = fs.readFileSync('/tmp/release_notes.md', 'utf8').trim();
          }

          const manualWarning = fs.existsSync('/tmp/manual_warning.md')
            ? fs.readFileSync('/tmp/manual_warning.md', 'utf8').trim() : '';
          const manualKnownIssues = fs.existsSync('/tmp/manual_known_issues.md')
            ? fs.readFileSync('/tmp/manual_known_issues.md', 'utf8').trim() : '';
          const manualExtraNotes = fs.existsSync('/tmp/manual_extra_notes.md')
            ? fs.readFileSync('/tmp/manual_extra_notes.md', 'utf8').trim() : '';
          const hasManualInput = manualWarning || manualKnownIssues || manualExtraNotes;

          // ---- 构建下载表格 ----
          const releaseDir = './release';
          const allFiles = fs.readdirSync(releaseDir).filter(f => fs.statSync(path.join(releaseDir, f)).isFile());
          const userFiles = allFiles.filter(f => f.endsWith('.zip') || f.endsWith('.AppImage'));

          const platformMap = {
            'win-x86': { platform: 'Windows', arch: 'x86 (32位)' },
            'win-x64': { platform: 'Windows', arch: 'x64 (64位)' },
            'win-arm64': { platform: 'Windows', arch: 'ARM64' },
            'linux-x64': { platform: 'Linux', arch: 'x64 (64位)' },
            'linux-arm64': { platform: 'Linux', arch: 'ARM64' },
            'osx-x64': { platform: 'macOS', arch: 'x64 (Intel)' },
            'osx-arm64': { platform: 'macOS', arch: 'ARM64 (Apple Silicon)' },
          };

          let body = '## 下载\n\n';
          body += '| 平台 | 架构 | 文件 |\n';
          body += '|:----:|:----:|:----:|\n';

          const ridOrder = ['win-x86', 'win-x64', 'win-arm64', 'linux-x64', 'linux-arm64', 'osx-x64', 'osx-arm64'];
          for (const rid of ridOrder) {
            const matched = userFiles.find(f => f.includes(rid));
            if (matched) {
              const info = platformMap[rid];
              const url = `https://github.com/${{ github.repository }}/releases/download/${version}/${matched}`;
              body += `| ${info.platform} | ${info.arch} | [${matched}](${url}) |\n`;
            }
          }
          body += '\n';
          body += '> **其他文件说明**\n';
          body += '> - `.nupkg` — Velopack 自动更新使用的更新包（full 为完整包，delta 为差异包），无需手动下载\n';
          body += '> - `releases.*.json` — 更新索引文件，供启动器检查更新时读取，无需手动下载\n\n';

          // ---- 预发布警告 ----
          if (isPrerelease) {
            body += '---\n\n';
            body += '> [!WARNING]\n';
            body += '> **此版本为预发布版本**\n';
            body += '> - 可能包含未发现的 Bug\n';
            body += '> - 功能可能不稳定\n';
            body += '> - 部分功能可能会在正式版中更改\n';
            body += '> \n';
            body += '> 不建议在生产环境或日常使用中使用此版本。如发现问题请在 [Issues](https://github.com/${{ github.repository }}/issues) 反馈。\n\n';
          }

          // ---- 更新公告 ----
          let announcement = '';
          if (hasManualInput) {
            // 优先使用手动输入
            announcement += '\n---\n\n## 更新公告\n\n';
            if (manualWarning) announcement += manualWarning + '\n\n';
            if (manualKnownIssues) announcement += manualKnownIssues + '\n\n';
            if (manualExtraNotes) announcement += manualExtraNotes + '\n\n';
          } else if (releaseNotes) {
            // 降级到 RELEASE_NOTES.md
            announcement += '\n---\n\n' + releaseNotes + '\n\n';
          }

          if (announcement.trim()) {
            body += announcement;
            body += '\n> [!TIP]\n';
            body += '> 在启动器的 **设置 -> 通用 -> 更新通道** 中可切换接收预览版更新。\n\n';
          }

          // ---- 更新内容 ----
          body += '---\n\n';
          if (changelog && changelog.trim()) {
            body += '<details>\n<summary><b>更新内容</b> (点击展开)</summary>\n\n';
            body += changelog + '\n';
            body += '</details>\n';
          } else if (skipChangelog) {
            body += '## 更新内容\n\n更新内容已省略（手动跳过）。\n';
          } else {
            body += '## 更新内容\n\n暂无更新内容描述。\n';
          }

          // ---- 创建 Release ----
          const release = await github.rest.repos.createRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            tag_name: version,
            name: version,
            body: body,
            draft: false,
            prerelease: isPrerelease
          });
          console.log('创建发布成功:', release.data.html_url);

          // ---- 上传文件 ----
          const releaseFiles = fs.readdirSync('./release');
          for (const file of releaseFiles) {
            const filePath = path.join('./release', file);
            const stat = fs.statSync(filePath);
            if (!stat.isFile()) continue;

            console.log('上传文件: ' + file + ' (' + stat.size + ' bytes)');
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: file,
              data: fs.readFileSync(filePath)
            });
            console.log('文件 ' + file + ' 上传成功');
          }
          console.log('所有文件上传完成');
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
