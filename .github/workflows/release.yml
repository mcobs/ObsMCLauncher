name: Release ObsMCLauncher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        rid:
          - win-x86
          - win-x64
          - win-arm64
          - linux-x64
          - linux-arm64
          - osx-x64
          - osx-arm64
        exclude:
          - os: windows-latest
            rid: linux-x64
          - os: windows-latest
            rid: linux-arm64
          - os: windows-latest
            rid: osx-x64
          - os: windows-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: win-x86
          - os: ubuntu-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: win-arm64
          - os: ubuntu-latest
            rid: osx-x64
          - os: ubuntu-latest
            rid: osx-arm64
          - os: macos-latest
            rid: win-x86
          - os: macos-latest
            rid: win-x64
          - os: macos-latest
            rid: win-arm64
          - os: macos-latest
            rid: linux-x64
          - os: macos-latest
            rid: linux-arm64

    runs-on: ${{ matrix.os }}

    env:
      Project_Path: ObsMCLauncher.Desktop/ObsMCLauncher.Desktop.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore ${{ env.Project_Path }}

    - name: Build application
      run: dotnet build ${{ env.Project_Path }} -c Release --no-restore

    - name: Get version info
      id: version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          version="${{ github.event.inputs.tag }}"
        else
          version="${GITHUB_REF#refs/tags/}"
        fi
        version_number=$(echo "$version" | sed 's/^v//')
        if echo "$version" | grep -qE '-(alpha|beta|rc|pre|test|preview)'; then
          is_prerelease="true"
        else
          is_prerelease="false"
        fi
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "version_number=$version_number" >> $GITHUB_OUTPUT
        echo "is_prerelease=$is_prerelease" >> $GITHUB_OUTPUT
        echo "当前版本: $version"
        echo "是否预发布: $is_prerelease"

    - name: Publish ${{ matrix.rid }}
      run: |
        dotnet publish ${{ env.Project_Path }} -c Release -r ${{ matrix.rid }} --self-contained false -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=none -p:DebugSymbols=false -p:Version=${{ steps.version.outputs.version_number }} -o ./publish/${{ matrix.rid }}

    - name: Set executable permission (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        if [ -f "./publish/${{ matrix.rid }}/ObsMCLauncher.Desktop" ]; then
          chmod +x "./publish/${{ matrix.rid }}/ObsMCLauncher.Desktop"
        fi

    - name: Create ZIP archive
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          powershell -Command "Compress-Archive -Path './publish/${{ matrix.rid }}/*' -DestinationPath './ObsMCLauncher-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip'"
        else
          cd "./publish/${{ matrix.rid }}" && zip -r "../../ObsMCLauncher-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip" . && cd ../..
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ObsMCLauncher-${{ steps.version.outputs.version }}-${{ matrix.rid }}
        path: ./ObsMCLauncher-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip
        retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version info
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          version="${{ github.event.inputs.tag }}"
        else
          version="${GITHUB_REF#refs/tags/}"
        fi
        if echo "$version" | grep -qE '-(alpha|beta|rc|pre|test|preview)'; then
          is_prerelease="true"
        else
          is_prerelease="false"
        fi
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "is_prerelease=$is_prerelease" >> $GITHUB_OUTPUT
        echo "当前版本: $version"
        echo "是否预发布: $is_prerelease"

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: List artifacts
      run: |
        echo "Artifacts 目录内容:"
        find ./artifacts -type f | head -50

    - name: Prepare release files
      run: |
        version="${{ steps.version.outputs.version }}"
        mkdir -p ./release

        find ./artifacts -name "*.zip" -exec cp {} ./release/ \;

        echo "Release 目录内容:"
        ls -la ./release/

    - name: Read CHANGELOG
      id: changelog
      run: |
        changelog_path="./.github/changelogs/CHANGELOG.md"

        if [ -f "$changelog_path" ]; then
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat "$changelog_path" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "读取到 CHANGELOG 内容"
        else
          echo "CHANGELOG.md 文件不存在"
          echo "changelog=" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: actions/github-script@v7
      with:
        script: |
          const version = '${{ steps.version.outputs.version }}';
          const isPrerelease = '${{ steps.version.outputs.is_prerelease }}' === 'true';
          const changelog = `${{ steps.changelog.outputs.changelog }}`;

          let body = '## 下载\n\n';
          body += '| 平台 | 架构 | 文件 |\n';
          body += '|:----:|:----:|:----:|\n';
          body += '| Windows | x86 (32位) | [ObsMCLauncher-' + version + '-win-x86.zip](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-win-x86.zip) |\n';
          body += '| Windows | x64 (64位) | [ObsMCLauncher-' + version + '-win-x64.zip](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-win-x64.zip) |\n';
          body += '| Windows | ARM64 | [ObsMCLauncher-' + version + '-win-arm64.zip](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-win-arm64.zip) |\n';
          body += '| Linux | x64 (64位) | [ObsMCLauncher-' + version + '-linux-x64.zip](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-linux-x64.zip) |\n';
          body += '| Linux | ARM64 | [ObsMCLauncher-' + version + '-linux-arm64.zip](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-linux-arm64.zip) |\n';
          body += '| macOS | x64 (Intel) | [ObsMCLauncher-' + version + '-osx-x64.zip](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-osx-x64.zip) |\n';
          body += '| macOS | ARM64 (Apple Silicon) | [ObsMCLauncher-' + version + '-osx-arm64.zip](https://github.com/${{ github.repository }}/releases/download/' + version + '/ObsMCLauncher-' + version + '-osx-arm64.zip) |\n\n';

          if (isPrerelease) {
            body += '---\n\n## 预发布版本警告\n\n';
            body += '**此版本为预发布版本，可能存在以下问题：**\n';
            body += '- 可能包含未发现的 Bug\n';
            body += '- 功能可能不稳定\n';
            body += '- 部分功能可能会在正式版中更改\n\n';
            body += '**不建议在生产环境或日常使用中使用此版本。**\n\n';
            body += '如果您发现问题，请在 [Issues](https://github.com/${{ github.repository }}/issues) 中反馈。\n';
          }

          if (changelog && changelog.trim()) {
            body += '\n---\n\n';
            body += changelog;
            body += '\n';
          } else {
            body += '\n---\n\n## 更新内容\n\n暂无更新内容描述。\n';
          }

          const release = await github.rest.repos.createRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            tag_name: version,
            name: 'ObsMCLauncher ' + version,
            body: body,
            draft: false,
            prerelease: isPrerelease
          });

          console.log('创建发布成功:', release.data.html_url);

          const fs = require('fs');
          const path = require('path');
          const releaseFiles = fs.readdirSync('./release');

          for (const file of releaseFiles) {
            if (file.endsWith('.zip')) {
              const filePath = path.join('./release', file);
              console.log('上传文件: ' + file);

              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: file,
                data: fs.readFileSync(filePath)
              });

              console.log('文件 ' + file + ' 上传成功');
            }
          }

          console.log('所有文件上传完成');
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
